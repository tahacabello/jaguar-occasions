<script>
// After product.js renders #productDetail, inject sticky bottom CTA on mobile
(function injectStickyCta() {
  const observer = new MutationObserver(() => {
    const detail = document.getElementById('productDetail');
    if (!detail || !detail.innerHTML.trim()) return;
    observer.disconnect();

    // Only add sticky CTA on mobile (handled in CSS via media query too)
    const whatsappBtn = detail.querySelector('[href*="wa.me"]');
    if (!whatsappBtn) return;

    const cta = document.createElement('div');
    cta.className = 'sticky-cta';
    cta.innerHTML = `
      <a class="btn secondary full" href="tel:0921544663">📞 اتصال</a>
      <a class="btn full" href="${whatsappBtn.href}" target="_blank" rel="noopener">💬 واتساب</a>
    `;
    document.body.appendChild(cta);
  });

  const detail = document.getElementById('productDetail');
  if (detail) observer.observe(detail, { childList: true, subtree: true });
})();
</script>
